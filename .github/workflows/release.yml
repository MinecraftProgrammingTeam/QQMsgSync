name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Get version and hash
        id: info
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          HASH=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "artifact=qqmsgsync-${VERSION}-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        run: mv target/qqmsgsync-*.jar target/${{ steps.info.outputs.artifact }}.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.info.outputs.artifact }}.jar
          path: target/${{ steps.info.outputs.artifact }}.jar

      - name: Get tag version
        if: startsWith(github.ref, 'refs/tags/')
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.version }}
          files: target/${{ steps.info.outputs.artifact }}.jar
          generate_release_notes: true
